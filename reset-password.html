<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - GP Ansor Ranting Kujorowesi</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "islamic-green": "#008000",
            },
          },
        },
      };
    </script>
  </head>

  <body class="min-h-screen bg-white text-slate-900 flex items-center justify-center px-4">
    <div class="w-full max-w-md mx-auto text-center">
      <div class="rounded-3xl border border-emerald-200 bg-white p-8 shadow-sm">
        <div class="flex flex-col items-center">
          <div
            class="flex h-14 w-14 items-center justify-center rounded-2xl bg-islamic-green/10 ring-1 ring-islamic-green/20"
            aria-label="GP Ansor logo"
          >
            <span class="text-islamic-green font-extrabold tracking-tight">GP</span>
          </div>
          <h1 class="mt-4 text-xl font-extrabold tracking-tight">Reset Password</h1>
          <p class="mt-2 text-sm text-slate-600">
            Sistem reset password telah diperbarui. Silakan gunakan halaman Lupa Password untuk mereset password Anda melalui kode OTP.
          </p>
          <a
            href="./forgot-password.html"
            class="mt-6 inline-block w-full rounded-2xl bg-islamic-green px-4 py-3 text-sm font-bold text-white shadow-sm hover:bg-emerald-700 transition"
          >
            Lanjutkan ke Lupa Password
          </a>
          <a
            href="./login.html"
            class="mt-3 inline-block text-sm font-semibold text-islamic-green hover:text-emerald-800 transition"
          >
            Kembali ke Login
          </a>
        </div>
      </div>
    </div>

    <script>
      // If a token exists in URL, store it in sessionStorage for potential use
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      if (token) {
        console.log('Token lama terdeteksi. Silakan gunakan halaman forgot-password untuk verifikasi OTP.');
      }
    </script>
  </body>
</html>
