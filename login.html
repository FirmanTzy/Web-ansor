<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - GP Ansor Ranting Kujorowesi</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "islamic-green": "#008000",
            },
          },
        },
      };
    </script>

    <style>
      :focus-visible {
        outline: 3px solid rgba(0, 128, 0, 0.45);
        outline-offset: 2px;
      }
    </style>
  </head>

  <body class="min-h-screen bg-white text-slate-900">
    <!-- Back to home -->
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 pt-6">
      <a
        href="./index.html"
        class="inline-flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-islamic-green transition"
      >
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" />
        </svg>
        Back to Home
      </a>
    </div>

    <main class="mx-auto flex min-h-[calc(100vh-80px)] items-center px-4 sm:px-6 lg:px-8">
      <div class="w-full max-w-md mx-auto">
        <div class="rounded-3xl border border-emerald-200 bg-white p-6 sm:p-8 shadow-sm">
          <!-- Branding / Logo placeholder -->
          <div class="flex flex-col items-center text-center">
            <div
              class="flex h-14 w-14 items-center justify-center rounded-2xl bg-islamic-green/10 ring-1 ring-islamic-green/20"
              aria-label="GP Ansor logo"
            >
              <span class="text-islamic-green font-extrabold tracking-tight">GP</span>
            </div>
            <h1 class="mt-4 text-xl font-extrabold tracking-tight">Login Admin</h1>
            <p class="mt-1 text-xs text-islamic-green font-semibold">Panel: GP Ansor Ranting Kujorowesi</p>
            <p class="mt-1 text-sm text-slate-600">GP Ansor Ranting Kujorowesi</p>
          </div>

          <!-- Login form -->
<form class="mt-7" id="loginForm" autocomplete="off">
            <div id="loginError" class="hidden mb-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700"></div>
            <div class="space-y-4">
              <!-- Username/Email -->
              <div>
                <label for="username" class="mb-2 block text-sm font-semibold text-slate-700">Username / Email</label>
                <input
                  id="username"
                  name="username"
                  type="text"
                  autocomplete="username"
                  required
                  placeholder="Masukkan username atau email"
                  class="w-full rounded-2xl border border-emerald-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10"
                />
              </div>

              <!-- Password with show/hide -->
              <div>
                <label for="password" class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
                <div class="relative">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    required
                    placeholder="Masukkan password"
                    class="w-full rounded-2xl border border-emerald-200 bg-white px-4 py-3 pr-12 text-sm outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10"
                  />

                  <button
                    id="togglePassword"
                    type="button"
                    class="absolute inset-y-0 right-3 flex items-center"
                    aria-label="Tampilkan / sembunyikan password"
                  >
                    <svg id="eyeIcon" class="h-5 w-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg id="eyeOffIcon" class="hidden h-5 w-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.86 21.86 0 0 1 5.06-6.94" />
                      <path d="M1 1l22 22" />
                      <path d="M9.53 9.53A3.5 3.5 0 0 0 12 15a3.5 3.5 0 0 0 2.47-5.47" />
                      <path d="M14.47 14.47A3.5 3.5 0 0 0 12 9" />
                      <path d="M9.53 9.53A3.5 3.5 0 0 1 12 9c4 0 7.3 3 8.9 6-0.7 1.2-1.7 2.5-2.9 3.6" />
                    </svg>
                  </button>
                </div>
              </div>

              <!-- Remember me + forgot -->
              <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <label class="inline-flex cursor-pointer items-center gap-2 text-sm text-slate-700 select-none">
                  <input type="checkbox" name="remember" class="h-4 w-4 rounded border-emerald-200 text-islamic-green focus:ring-islamic-green/10" />
                  Remember Me
                </label>

                <a href="./forgot-password.html" class="text-sm font-semibold text-islamic-green hover:text-emerald-800 transition">
                  Lupa password?
                </a>
              </div>

              <!-- Submit -->
              <button
                type="submit"
                class="mt-2 w-full rounded-2xl bg-islamic-green px-4 py-3 text-sm font-bold text-white shadow-sm hover:bg-emerald-700 transition focus:ring-4 focus:ring-islamic-green/15"
              >
                Masuk
              </button>

              <p class="text-center text-xs text-slate-500" id="loginHint">
                Masuk untuk mengelola data admin.
              </p>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script>
      const API_BASE_URL = window.API_BASE_URL || 'http://localhost:3000';

      const loginForm = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');

      function showError(msg) {
        if (!loginError) return;
        loginError.textContent = msg;
        loginError.classList.remove('hidden');
      }

      function hideError() {
        if (!loginError) return;
        loginError.textContent = '';
        loginError.classList.add('hidden');
      }

      if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          hideError();

          const username = document.getElementById('username')?.value?.trim();
          const password = document.getElementById('password')?.value;

          try {
            const rememberInput = loginForm.querySelector('input[name="remember"]');
            const rememberMe = rememberInput ? Boolean(rememberInput.checked) : false;

            const res = await fetch(`${API_BASE_URL}/api/admin/login`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password }),
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
              showError(data?.message || 'Login gagal.');
              return;
            }

            const token = data?.token;
            if (!token) {
              showError('Token tidak ditemukan.');
              return;
            }

            // Save JWT
            localStorage.setItem('admin_jwt', token);
            localStorage.setItem('admin_remember_me', rememberMe ? '1' : '0');

            window.location.href = './admin-dashboard.html';
          } catch (err) {
            showError('Terjadi kesalahan saat login.');
          }
        });
      }

      const togglePassword = document.getElementById('togglePassword');
      const passwordEl = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      const eyeOffIcon = document.getElementById('eyeOffIcon');

      if (togglePassword && passwordEl && eyeIcon && eyeOffIcon) {
        togglePassword.addEventListener('click', () => {
          const isPassword = passwordEl.type === 'password';
          passwordEl.type = isPassword ? 'text' : 'password';

          if (isPassword) {
            eyeIcon.classList.add('hidden');
            eyeOffIcon.classList.remove('hidden');
          } else {
            eyeOffIcon.classList.add('hidden');
            eyeIcon.classList.remove('hidden');
          }
        });
      }
    </script>
  </body>
</html>
