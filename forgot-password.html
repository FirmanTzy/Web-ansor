<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password - GP Ansor Ranting Kujorowesi</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "islamic-green": "#008000",
            },
          },
        },
      };
    </script>

    <style>
      :focus-visible {
        outline: 3px solid rgba(0, 128, 0, 0.45);
        outline-offset: 2px;
      }
      /* OTP input styling */
      .otp-input {
        width: 3rem;
        height: 3.5rem;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        font-family: monospace;
      }
      @media (min-width: 640px) {
        .otp-input {
          width: 3.5rem;
          height: 4rem;
          font-size: 1.75rem;
        }
      }
    </style>
  </head>

  <body class="min-h-screen bg-white text-slate-900">
    <!-- Back to Login -->
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 pt-6">
      <a
        href="./login.html"
        class="inline-flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-islamic-green transition"
      >
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" />
        </svg>
        Kembali ke Login
      </a>
    </div>

    <main class="mx-auto flex min-h-[calc(100vh-80px)] items-center px-4 sm:px-6 lg:px-8">
      <div class="w-full max-w-md mx-auto">
        <div class="rounded-3xl border border-emerald-200 bg-white p-6 sm:p-8 shadow-sm">
          <!-- Branding / Logo placeholder -->
          <div class="flex flex-col items-center text-center">
            <div
              class="flex h-14 w-14 items-center justify-center rounded-2xl bg-islamic-green/10 ring-1 ring-islamic-green/20"
              aria-label="GP Ansor logo"
            >
              <span class="text-islamic-green font-extrabold tracking-tight">GP</span>
            </div>
            <h1 class="mt-4 text-xl font-extrabold tracking-tight">Reset Password</h1>
            <p class="mt-1 text-xs text-islamic-green font-semibold">Panel: GP Ansor Ranting Kujorowesi</p>

            <!-- Step indicator -->
            <div class="mt-4 flex items-center gap-2 text-xs font-semibold">
              <span id="step1Indicator" class="flex h-7 w-7 items-center justify-center rounded-full bg-islamic-green text-white">1</span>
              <span class="h-px w-8 bg-slate-300"></span>
              <span id="step2Indicator" class="flex h-7 w-7 items-center justify-center rounded-full bg-slate-200 text-slate-500">2</span>
              <span class="h-px w-8 bg-slate-300"></span>
              <span id="step3Indicator" class="flex h-7 w-7 items-center justify-center rounded-full bg-slate-200 text-slate-500">3</span>
            </div>
            <p id="stepTitle" class="mt-2 text-sm text-slate-600">Masukkan email/username admin Anda</p>
          </div>

          <!-- ==================== STEP 1: Request OTP ==================== -->
          <form class="mt-6" id="step1Form" autocomplete="off">
            <div id="step1Error" class="hidden mb-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700"></div>
            <div id="step1Success" class="hidden mb-4 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-700"></div>

            <div class="space-y-4">
              <div>
                <label for="username" class="mb-2 block text-sm font-semibold text-slate-700">Username / Email</label>
                <input
                  id="username"
                  name="username"
                  type="text"
                  autocomplete="username"
                  required
                  placeholder="Masukkan username atau email"
                  class="w-full rounded-2xl border border-emerald-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10"
                />
              </div>

              <button
                type="submit"
                id="step1Btn"
                class="mt-2 w-full rounded-2xl bg-islamic-green px-4 py-3 text-sm font-bold text-white shadow-sm hover:bg-emerald-700 transition focus:ring-4 focus:ring-islamic-green/15 disabled:opacity-50 disabled:cursor-not-allowed"
              >
                Kirim Kode OTP
              </button>
            </div>
          </form>

          <!-- ==================== STEP 2: Verify OTP ==================== -->
          <form class="mt-6 hidden" id="step2Form" autocomplete="off">
            <div id="step2Error" class="hidden mb-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700"></div>
            <div id="step2Success" class="hidden mb-4 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-700"></div>

            <div class="space-y-4">
              <p class="text-center text-sm text-slate-600">
                Kode OTP telah dikirim ke <strong id="step2Email" class="text-islamic-green"></strong>
              </p>

              <!-- OTP Input (6 digit) -->
              <div>
                <label class="mb-3 block text-center text-sm font-semibold text-slate-700">Masukkan Kode OTP</label>
                <div class="flex items-center justify-center gap-2 sm:gap-3" id="otpContainer">
                  <input type="text" inputmode="numeric" maxlength="1" class="otp-input rounded-xl border border-emerald-200 bg-white outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10" data-index="0" />
                  <input type="text" inputmode="numeric" maxlength="1" class="otp-input rounded-xl border border-emerald-200 bg-white outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10" data-index="1" />
                  <input type="text" inputmode="numeric" maxlength="1" class="otp-input rounded-xl border border-emerald-200 bg-white outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10" data-index="2" />
                  <span class="text-2xl font-bold text-slate-400">-</span>
                  <input type="text" inputmode="numeric" maxlength="1" class="otp-input rounded-xl border border-emerald-200 bg-white outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10" data-index="3" />
                  <input type="text" inputmode="numeric" maxlength="1" class="otp-input rounded-xl border border-emerald-200 bg-white outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10" data-index="4" />
                  <input type="text" inputmode="numeric" maxlength="1" class="otp-input rounded-xl border border-emerald-200 bg-white outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10" data-index="5" />
                </div>
              </div>

              <!-- Timer & Resend -->
              <div class="text-center">
                <p id="otpTimer" class="text-sm text-slate-500">Kode berlaku <span id="timerCountdown" class="font-bold text-islamic-green">05:00</span></p>
                <button type="button" id="resendOtpBtn" class="mt-2 text-sm font-semibold text-islamic-green hover:text-emerald-800 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                  Kirim Ulang OTP (<span id="resendCountdown">30</span>)
                </button>
              </div>

              <button
                type="submit"
                id="step2Btn"
                class="mt-2 w-full rounded-2xl bg-islamic-green px-4 py-3 text-sm font-bold text-white shadow-sm hover:bg-emerald-700 transition focus:ring-4 focus:ring-islamic-green/15 disabled:opacity-50 disabled:cursor-not-allowed"
              >
                Verifikasi Kode
              </button>

              <div class="text-center">
                <button type="button" id="backToStep1Btn" class="text-sm font-semibold text-slate-500 hover:text-slate-700 transition">
                  &larr; Ganti email
                </button>
              </div>
            </div>
          </form>

          <!-- ==================== STEP 3: Reset Password ==================== -->
          <form class="mt-6 hidden" id="step3Form" autocomplete="off">
            <div id="step3Error" class="hidden mb-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700"></div>
            <div id="step3Success" class="hidden mb-4 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-700"></div>

            <div class="space-y-4">
              <p class="text-center text-sm text-slate-600">Buat password baru untuk akun Anda</p>

              <!-- Password Baru -->
              <div>
                <label for="newPassword" class="mb-2 block text-sm font-semibold text-slate-700">Password Baru</label>
                <div class="relative">
                  <input
                    id="newPassword"
                    name="newPassword"
                    type="password"
                    autocomplete="new-password"
                    required
                    minlength="6"
                    placeholder="Minimal 6 karakter"
                    class="w-full rounded-2xl border border-emerald-200 bg-white px-4 py-3 pr-12 text-sm outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10"
                  />
                  <button
                    id="toggleNewPassword"
                    type="button"
                    class="absolute inset-y-0 right-3 flex items-center"
                    aria-label="Tampilkan / sembunyikan password"
                  >
                    <svg id="eyeIconNew" class="h-5 w-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg id="eyeOffIconNew" class="hidden h-5 w-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.86 21.86 0 0 1 5.06-6.94" />
                      <path d="M1 1l22 22" />
                      <path d="M9.53 9.53A3.5 3.5 0 0 0 12 15a3.5 3.5 0 0 0 2.47-5.47" />
                      <path d="M14.47 14.47A3.5 3.5 0 0 0 12 9" />
                      <path d="M9.53 9.53A3.5 3.5 0 0 1 12 9c4 0 7.3 3 8.9 6-0.7 1.2-1.7 2.5-2.9 3.6" />
                    </svg>
                  </button>
                </div>
              </div>

              <!-- Konfirmasi Password -->
              <div>
                <label for="newPasswordConfirm" class="mb-2 block text-sm font-semibold text-slate-700">Konfirmasi Password Baru</label>
                <div class="relative">
                  <input
                    id="newPasswordConfirm"
                    name="newPasswordConfirm"
                    type="password"
                    autocomplete="new-password"
                    required
                    minlength="6"
                    placeholder="Ulangi password baru"
                    class="w-full rounded-2xl border border-emerald-200 bg-white px-4 py-3 pr-12 text-sm outline-none transition focus:border-islamic-green focus:ring-4 focus:ring-islamic-green/10"
                  />
                  <button
                    id="toggleNewPasswordConfirm"
                    type="button"
                    class="absolute inset-y-0 right-3 flex items-center"
                    aria-label="Tampilkan / sembunyikan password"
                  >
                    <svg id="eyeIconConfirmNew" class="h-5 w-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg id="eyeOffIconConfirmNew" class="hidden h-5 w-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.86 21.86 0 0 1 5.06-6.94" />
                      <path d="M1 1l22 22" />
                      <path d="M9.53 9.53A3.5 3.5 0 0 0 12 15a3.5 3.5 0 0 0 2.47-5.47" />
                      <path d="M14.47 14.47A3.5 3.5 0 0 0 12 9" />
                      <path d="M9.53 9.53A3.5 3.5 0 0 1 12 9c4 0 7.3 3 8.9 6-0.7 1.2-1.7 2.5-2.9 3.6" />
                    </svg>
                  </button>
                </div>
              </div>

              <button
                type="submit"
                id="step3Btn"
                class="mt-2 w-full rounded-2xl bg-islamic-green px-4 py-3 text-sm font-bold text-white shadow-sm hover:bg-emerald-700 transition focus:ring-4 focus:ring-islamic-green/15 disabled:opacity-50 disabled:cursor-not-allowed"
              >
                Reset Password
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script>
      const API_BASE_URL = window.API_BASE_URL || 'http://localhost:3000';

      // ── State ─────────────────────────────────────────────────────────────
      let currentUsername = '';
      let tempToken = '';
      let otpTimerInterval = null;
      let resendCooldownInterval = null;
      const OTP_EXPIRY_SECONDS = 300; // 5 menit
      const RESEND_COOLDOWN = 30; // 30 detik

      // ── DOM Elements ──────────────────────────────────────────────────────
      const step1Form = document.getElementById('step1Form');
      const step2Form = document.getElementById('step2Form');
      const step3Form = document.getElementById('step3Form');
      const step1Indicator = document.getElementById('step1Indicator');
      const step2Indicator = document.getElementById('step2Indicator');
      const step3Indicator = document.getElementById('step3Indicator');
      const stepTitle = document.getElementById('stepTitle');
      const step2Email = document.getElementById('step2Email');

      const step1Error = document.getElementById('step1Error');
      const step1Success = document.getElementById('step1Success');
      const step2Error = document.getElementById('step2Error');
      const step2Success = document.getElementById('step2Success');
      const step3Error = document.getElementById('step3Error');
      const step3Success = document.getElementById('step3Success');

      const step1Btn = document.getElementById('step1Btn');
      const step2Btn = document.getElementById('step2Btn');
      const step3Btn = document.getElementById('step3Btn');

      const usernameInput = document.getElementById('username');
      const otpInputs = document.querySelectorAll('#otpContainer input');
      const timerCountdown = document.getElementById('timerCountdown');
      const otpTimer = document.getElementById('otpTimer');
      const resendOtpBtn = document.getElementById('resendOtpBtn');
      const resendCountdown = document.getElementById('resendCountdown');
      const backToStep1Btn = document.getElementById('backToStep1Btn');

      // ── Helper Functions ─────────────────────────────────────────────────
      function showError(el, msg) {
        el.textContent = msg;
        el.classList.remove('hidden');
      }

      function showSuccess(el, msg) {
        el.textContent = msg;
        el.classList.remove('hidden');
      }

      function hideAll(el) {
        el.classList.add('hidden');
      }

      function switchStep(step) {
        // Hide all forms
        step1Form.classList.add('hidden');
        step2Form.classList.add('hidden');
        step3Form.classList.add('hidden');

        // Reset indicators
        step1Indicator.className = 'flex h-7 w-7 items-center justify-center rounded-full bg-slate-200 text-slate-500';
        step2Indicator.className = 'flex h-7 w-7 items-center justify-center rounded-full bg-slate-200 text-slate-500';
        step3Indicator.className = 'flex h-7 w-7 items-center justify-center rounded-full bg-slate-200 text-slate-500';

        if (step === 1) {
          step1Form.classList.remove('hidden');
          step1Indicator.className = 'flex h-7 w-7 items-center justify-center rounded-full bg-islamic-green text-white';
          stepTitle.textContent = 'Masukkan email/username admin Anda';
          // Reset errors
          hideAll(step1Error);
          hideAll(step1Success);
        } else if (step === 2) {
          step2Form.classList.remove('hidden');
          step1Indicator.className = 'flex h-7 w-7 items-center justify-center rounded-full bg-islamic-green text-white';
          step2Indicator.className = 'flex h-7 w-7 items-center justify-center rounded-full bg-islamic-green text-white';
          stepTitle.textContent = 'Verifikasi kode OTP';
          hideAll(step2Error);
          hideAll(step2Success);
        } else if (step === 3) {
          step3Form.classList.remove('hidden');
          step1Indicator.className = 'flex h-7 w-7 items-center justify-center rounded-full bg-islamic-green text-white';
          step2Indicator.className = 'flex h-7 w-7 items-center justify-center rounded-full bg-islamic-green text-white';
          step3Indicator.className = 'flex h-7 w-7 items-center justify-center rounded-full bg-islamic-green text-white';
          stepTitle.textContent = 'Buat password baru';
          hideAll(step3Error);
          hideAll(step3Success);
        }
      }

      // ── OTP Input Auto-Focus ─────────────────────────────────────────────
      otpInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value;
          // Only allow digits
          if (val && !/^\d$/.test(val)) {
            e.target.value = '';
            return;
          }
          // Auto-focus next
          if (val && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && index > 0) {
            otpInputs[index - 1].focus();
          }
        });

        // Allow paste
        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const paste = (e.clipboardData || window.clipboardData).getData('text');
          const digits = paste.replace(/\D/g, '').split('');
          digits.forEach((digit, i) => {
            if (i < otpInputs.length && /^\d$/.test(digit)) {
              otpInputs[i].value = digit;
              if (i < otpInputs.length - 1) otpInputs[i + 1].focus();
            }
          });
        });
      });

      function getOtpValue() {
        let otp = '';
        otpInputs.forEach((input) => { otp += input.value; });
        return otp;
      }

      function clearOtpInputs() {
        otpInputs.forEach((input) => { input.value = ''; });
        if (otpInputs[0]) otpInputs[0].focus();
      }

      // ── OTP Timer ────────────────────────────────────────────────────────
      function startOtpTimer() {
        clearInterval(otpTimerInterval);
        let remaining = OTP_EXPIRY_SECONDS;

        function updateDisplay() {
          const mins = String(Math.floor(remaining / 60)).padStart(2, '0');
          const secs = String(remaining % 60).padStart(2, '0');
          timerCountdown.textContent = `${mins}:${secs}`;
          if (remaining <= 0) {
            clearInterval(otpTimerInterval);
            timerCountdown.textContent = '00:00';
            timerCountdown.className = 'font-bold text-red-600';
          }
        }

        updateDisplay();
        otpTimerInterval = setInterval(() => {
          remaining--;
          updateDisplay();
          if (remaining <= 0) {
            clearInterval(otpTimerInterval);
          }
        }, 1000);
      }

      function startResendCooldown() {
        clearInterval(resendCooldownInterval);
        resendOtpBtn.disabled = true;
        let cooldown = RESEND_COOLDOWN;

        function updateCooldown() {
          resendCountdown.textContent = cooldown;
          if (cooldown <= 0) {
            resendOtpBtn.disabled = false;
            resendCountdown.textContent = '0';
            clearInterval(resendCooldownInterval);
          }
        }

        updateCooldown();
        resendCooldownInterval = setInterval(() => {
          cooldown--;
          updateCooldown();
        }, 1000);
      }

      // ── Password Toggle ──────────────────────────────────────────────────
      function setupToggle(toggleId, inputId, eyeId, eyeOffId) {
        const toggle = document.getElementById(toggleId);
        const input = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);
        const eyeOff = document.getElementById(eyeOffId);
        if (toggle && input && eye && eyeOff) {
          toggle.addEventListener('click', () => {
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            eye.classList.toggle('hidden');
            eyeOff.classList.toggle('hidden');
          });
        }
      }
      setupToggle('toggleNewPassword', 'newPassword', 'eyeIconNew', 'eyeOffIconNew');
      setupToggle('toggleNewPasswordConfirm', 'newPasswordConfirm', 'eyeIconConfirmNew', 'eyeOffIconConfirmNew');

      // ── STEP 1: Send OTP ─────────────────────────────────────────────────
      step1Form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAll(step1Error);
        hideAll(step1Success);

        const username = usernameInput.value.trim();
        if (!username) {
          showError(step1Error, 'Masukkan username atau email terlebih dahulu.');
          return;
        }

        step1Btn.disabled = true;
        step1Btn.textContent = 'Mengirim...';

        try {
          const res = await fetch(`${API_BASE_URL}/api/admin/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username }),
          });

          const data = await res.json().catch(() => ({}));

          showSuccess(step1Success, data?.message || 'Kode OTP telah dikirim ke email Anda.');

          // Store username and proceed to step 2
          currentUsername = username;
          step2Email.textContent = username;

          // Switch to step 2 after short delay
          setTimeout(() => {
            switchStep(2);
            clearOtpInputs();
            startOtpTimer();
            startResendCooldown();
            timerCountdown.className = 'font-bold text-islamic-green';
          }, 1000);
        } catch (err) {
          showError(step1Error, 'Terjadi kesalahan. Silakan coba lagi.');
        } finally {
          step1Btn.disabled = false;
          step1Btn.textContent = 'Kirim Kode OTP';
        }
      });

      // ── STEP 2: Verify OTP ───────────────────────────────────────────────
      step2Form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAll(step2Error);
        hideAll(step2Success);

        const otp = getOtpValue();
        if (otp.length !== 6 || !/^\d{6}$/.test(otp)) {
          showError(step2Error, 'Masukkan kode OTP 6 digit dengan benar.');
          return;
        }

        step2Btn.disabled = true;
        step2Btn.textContent = 'Memverifikasi...';

        try {
          const res = await fetch(`${API_BASE_URL}/api/admin/verify-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUsername, otp }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            showError(step2Error, data?.message || 'Kode OTP tidak valid.');
            return;
          }

          tempToken = data.tempToken;
          showSuccess(step2Success, data?.message || 'Kode OTP valid!');

          // Switch to step 3
          setTimeout(() => {
            switchStep(3);
            document.getElementById('newPassword').focus();
          }, 1000);
        } catch (err) {
          showError(step2Error, 'Terjadi kesalahan. Silakan coba lagi.');
        } finally {
          step2Btn.disabled = false;
          step2Btn.textContent = 'Verifikasi Kode';
        }
      });

      // ── Resend OTP ───────────────────────────────────────────────────────
      resendOtpBtn.addEventListener('click', async () => {
        if (resendOtpBtn.disabled) return;

        hideAll(step2Error);
        hideAll(step2Success);

        resendOtpBtn.disabled = true;
        resendOtpBtn.textContent = 'Mengirim...';

        try {
          const res = await fetch(`${API_BASE_URL}/api/admin/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUsername }),
          });

          const data = await res.json().catch(() => ({}));
          showSuccess(step2Success, 'Kode OTP baru telah dikirim.');

          // Reset timer & cooldown
          timerCountdown.className = 'font-bold text-islamic-green';
          startOtpTimer();
          startResendCooldown();
          clearOtpInputs();
        } catch (err) {
          showError(step2Error, 'Gagal mengirim ulang OTP.');
        } finally {
          resendOtpBtn.textContent = 'Kirim Ulang OTP';
        }
      });

      // ── Back to Step 1 ───────────────────────────────────────────────────
      backToStep1Btn.addEventListener('click', () => {
        clearInterval(otpTimerInterval);
        clearInterval(resendCooldownInterval);
        switchStep(1);
        usernameInput.focus();
      });

      // ── STEP 3: Reset Password ───────────────────────────────────────────
      step3Form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAll(step3Error);
        hideAll(step3Success);

        const password = document.getElementById('newPassword').value;
        const passwordConfirm = document.getElementById('newPasswordConfirm').value;

        if (!password || !passwordConfirm) {
          showError(step3Error, 'Harap isi password dan konfirmasi password.');
          return;
        }

        if (password.length < 6) {
          showError(step3Error, 'Password minimal 6 karakter.');
          return;
        }

        if (password !== passwordConfirm) {
          showError(step3Error, 'Password dan konfirmasi password tidak cocok.');
          return;
        }

        step3Btn.disabled = true;
        step3Btn.textContent = 'Memproses...';

        try {
          const res = await fetch(`${API_BASE_URL}/api/admin/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tempToken, password, passwordConfirm }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            showError(step3Error, data?.message || 'Gagal mereset password.');
            return;
          }

          showSuccess(step3Success, data?.message || 'Password berhasil direset!');
          document.getElementById('newPassword').value = '';
          document.getElementById('newPasswordConfirm').value = '';

          // Redirect to login after 3 seconds
          setTimeout(() => {
            window.location.href = './login.html';
          }, 3000);
        } catch (err) {
          showError(step3Error, 'Terjadi kesalahan. Silakan coba lagi.');
        } finally {
          step3Btn.disabled = false;
          step3Btn.textContent = 'Reset Password';
        }
      });
    </script>
  </body>
</html>
